version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: threat_intel_backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:///./threat_intel.db
      - SECRET_KEY=CYBER_PLATFORM_SUPER_SECRET_KEY_00E5FF_7B61FF
    volumes:
      - backend_data:/app
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: threat_intel_frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8000/api
    depends_on:
      - backend
    restart: always

volumes:
  backend_data:
